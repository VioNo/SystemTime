services:
  # =========== INFRASTRUCTURE ===========
  keycloak-postgres:
    image: postgres:17-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    ports:
      - "5433:5432"
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - system_time-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: keycloak
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - system_time-network

  # =========== DATABASES ===========
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:  # Лучше использовать environment вместо env_file для важных переменных
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_user_password
      POSTGRES_DB: system_time_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Монтируем SQL скрипт для инициализации (относительный путь от docker-compose.yml)
      - ./app/infrastructure/database/create.sql:/docker-entrypoint-initdb.d/01-create.sql
    networks:
      - system_time-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d system_time_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========== SERVICES ===========
  system_time:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: system_time
    ports:
      - "8001:8001"
    env_file:
      - app/.env
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - system_time-network
    restart: unless-stopped


volumes:
  keycloak-postgres-data:
  postgres-data:  # Добавил volume для основной БД

networks:
  system_time-network:
    driver: bridge